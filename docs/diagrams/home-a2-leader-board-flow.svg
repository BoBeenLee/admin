<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1020" preserveAspectRatio="xMidYMid meet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans KR', 'Apple SD Gothic Neo', 'Pretendard', monospace; }
    .node-name { fill: white; font-size: 12px; font-weight: 600; }
    .node-sub { fill: #94a3b8; font-size: 9px; font-weight: 400; }
    .node-decision { fill: white; font-size: 11px; font-weight: 600; }
    .arrow-label { font-size: 9px; font-weight: 600; }
    .title-text { fill: #f8fafc; font-size: 16px; font-weight: 700; }
    .subtitle-text { fill: #94a3b8; font-size: 10px; font-weight: 400; }
    .legend-text { fill: #cbd5e1; font-size: 9px; font-weight: 400; }
  </style>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-happy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-no" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="30" class="title-text">리더 현황 상세 확인 워크플로우 (A-2)</text>
  <text x="30" y="46" class="subtitle-text">home.html · 지점장의 매일 첫 의사결정 흐름</text>

  <!-- ============================ ARROWS (drawn first, behind boxes) ============================ -->

  <!-- Start → Widget 확인 -->
  <line x1="400" y1="115" x2="400" y2="160" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-happy)"/>

  <!-- Widget 확인 → Decision -->
  <line x1="400" y1="220" x2="400" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision Yes (down) -->
  <line x1="400" y1="345" x2="400" y2="395" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-happy)"/>
  <text x="412" y="372" class="arrow-label" fill="#34d399">Yes</text>

  <!-- Decision No (right → 정상 종료) -->
  <line x1="465" y1="290" x2="555" y2="290" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-no)"/>
  <text x="495" y="282" class="arrow-label" fill="#fb7185">No</text>

  <!-- 모달 → 오늘 탭 -->
  <line x1="400" y1="455" x2="400" y2="490" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-happy)"/>

  <!-- 오늘 탭 → 필터 -->
  <line x1="400" y1="550" x2="400" y2="585" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-happy)"/>

  <!-- 필터 → 전화 클릭 -->
  <line x1="400" y1="660" x2="400" y2="690" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-happy)"/>

  <!-- 전화 클릭 → I/O 복사 -->
  <line x1="400" y1="750" x2="400" y2="780" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-happy)"/>

  <!-- I/O → 대타 통화 -->
  <line x1="400" y1="840" x2="400" y2="870" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-happy)"/>

  <!-- 대타 통화 → End -->
  <line x1="400" y1="930" x2="400" y2="960" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-happy)"/>

  <!-- ============================ NODES ============================ -->

  <!-- Start: 지점장 출근 (rounded large, highlight blue) -->
  <rect x="310" y="65" width="180" height="50" rx="25" fill="#0f172a"/>
  <rect x="310" y="65" width="180" height="50" rx="25" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="400" y="89" class="node-name" text-anchor="middle">▶ 지점장 출근</text>
  <text x="400" y="104" class="node-sub" text-anchor="middle">앱 자동 진입</text>

  <!-- Process 1: 리더 현황 위젯 확인 (cyan) -->
  <rect x="300" y="160" width="200" height="60" rx="6" fill="#0f172a"/>
  <rect x="300" y="160" width="200" height="60" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="400" y="186" class="node-name" text-anchor="middle">리더 현황 위젯 확인</text>
  <text x="400" y="204" class="node-sub" text-anchor="middle">상태별 카운트 · 컴팩트 목록</text>

  <!-- Decision: 불참자 발견? (amber diamond) -->
  <g transform="translate(400, 290)">
    <polygon points="0,-55 65,0 0,55 -65,0" fill="#0f172a"/>
    <polygon points="0,-55 65,0 0,55 -65,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text y="0" class="node-decision" text-anchor="middle">불참자</text>
    <text y="16" class="node-decision" text-anchor="middle">발견?</text>
  </g>

  <!-- Right branch: 다른 위젯 확인 (slate, end) -->
  <rect x="555" y="265" width="180" height="50" rx="25" fill="#0f172a"/>
  <rect x="555" y="265" width="180" height="50" rx="25" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="645" y="289" class="node-name" text-anchor="middle">⏹ 다른 위젯 확인</text>
  <text x="645" y="304" class="node-sub" text-anchor="middle">정상 흐름 · 대응 불필요</text>

  <!-- Process 2: 크게 보기 → 모달 오픈 (cyan) -->
  <rect x="300" y="395" width="200" height="60" rx="6" fill="#0f172a"/>
  <rect x="300" y="395" width="200" height="60" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="400" y="421" class="node-name" text-anchor="middle">크게 보기 → 모달 오픈</text>
  <text x="400" y="439" class="node-sub" text-anchor="middle">리더 현황 보드 · 7일 탭</text>

  <!-- Process 3: 오늘 탭 기본 활성 (cyan, smaller) -->
  <rect x="320" y="490" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="320" y="490" width="160" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="400" y="513" class="node-name" text-anchor="middle">오늘 탭 기본 활성</text>
  <text x="400" y="528" class="node-sub" text-anchor="middle">상태 요약 바 노출</text>

  <!-- Process 4: 필터 적용 (emerald — multi-axis) -->
  <rect x="280" y="585" width="240" height="75" rx="6" fill="#0f172a"/>
  <rect x="280" y="585" width="240" height="75" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="400" y="608" class="node-name" text-anchor="middle">필터 적용 (3축)</text>
  <text x="400" y="625" class="node-sub" text-anchor="middle">• 상태: 불참</text>
  <text x="400" y="639" class="node-sub" text-anchor="middle">• 언어: 영어/일어</text>
  <text x="400" y="653" class="node-sub" text-anchor="middle">• 시간: 11시/8시</text>

  <!-- Process 5: 전화번호 클릭 (cyan) -->
  <rect x="300" y="690" width="200" height="60" rx="6" fill="#0f172a"/>
  <rect x="300" y="690" width="200" height="60" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="400" y="716" class="node-name" text-anchor="middle">📱 전화번호 클릭</text>
  <text x="400" y="734" class="node-sub" text-anchor="middle">불참 리더 행에서</text>

  <!-- I/O Parallelogram: 클립보드 복사 + 토스트 (emerald) -->
  <polygon points="305,780 530,780 510,840 285,840" fill="#0f172a"/>
  <polygon points="305,780 530,780 510,840 285,840" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="400" y="804" class="node-name" text-anchor="middle">📋 클립보드 복사 + 토스트</text>
  <text x="400" y="822" class="node-sub" text-anchor="middle">"복사됨" · 1.5초 노출</text>

  <!-- Process 6: 대타 배정 통화 (cyan) -->
  <rect x="300" y="870" width="200" height="60" rx="6" fill="#0f172a"/>
  <rect x="300" y="870" width="200" height="60" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="400" y="896" class="node-name" text-anchor="middle">📞 대타 배정 통화</text>
  <text x="400" y="914" class="node-sub" text-anchor="middle">외부 액션 · 협의 진행</text>

  <!-- End: 대응 완료 (rounded large, highlight) -->
  <rect x="310" y="960" width="180" height="50" rx="25" fill="#0f172a"/>
  <rect x="310" y="960" width="180" height="50" rx="25" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="400" y="984" class="node-name" text-anchor="middle">⏹ 대응 완료</text>
  <text x="400" y="999" class="node-sub" text-anchor="middle">불참 리더 식별 + 대타</text>

  <!-- ============================ LEGEND ============================ -->
  <g transform="translate(560, 590)">
    <rect x="0" y="0" width="270" height="200" rx="8" fill="rgba(15,23,42,0.85)" stroke="#334155" stroke-width="1"/>
    <text x="14" y="22" fill="#f8fafc" font-size="11" font-weight="700">Legend</text>

    <!-- Start/End -->
    <rect x="14" y="38" width="36" height="18" rx="9" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.3"/>
    <text x="60" y="51" class="legend-text">Start / End</text>

    <!-- Process -->
    <rect x="14" y="66" width="36" height="18" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.3"/>
    <text x="60" y="79" class="legend-text">Process (UI 액션)</text>

    <!-- Decision -->
    <g transform="translate(32, 102)">
      <polygon points="0,-12 22,0 0,12 -22,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.3"/>
    </g>
    <text x="60" y="106" class="legend-text">Decision</text>

    <!-- I/O Parallelogram -->
    <polygon points="14,124 50,124 47,142 11,142" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.3"/>
    <text x="60" y="137" class="legend-text">Input/Output</text>

    <!-- Happy path arrow -->
    <line x1="14" y1="160" x2="48" y2="160" stroke="#60a5fa" stroke-width="1.8" marker-end="url(#arrow-happy)"/>
    <text x="60" y="163" class="legend-text">Happy Path</text>

    <!-- Branch arrow -->
    <line x1="14" y1="184" x2="48" y2="184" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-no)"/>
    <text x="60" y="187" class="legend-text">Branch (정상 종료)</text>
  </g>
</svg>
