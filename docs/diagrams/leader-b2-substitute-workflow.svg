<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1230 730" preserveAspectRatio="xMidYMid meet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans KR', 'Apple SD Gothic Neo', 'Pretendard', monospace; }
    .actor-name { fill: white; font-size: 12px; font-weight: 600; }
    .actor-role { fill: #94a3b8; font-size: 9px; font-weight: 400; }
    .msg-label { fill: #e2e8f0; font-size: 10px; font-weight: 500; }
    .msg-label-return { fill: #94a3b8; font-size: 9px; font-style: italic; font-weight: 400; }
    .msg-num { fill: white; font-size: 8px; font-weight: 700; }
    .title-text { fill: #f8fafc; font-size: 16px; font-weight: 700; }
    .subtitle-text { fill: #94a3b8; font-size: 10px; font-weight: 400; }
    .note-text { fill: #fbbf24; font-size: 10px; font-weight: 500; }
    .legend-text { fill: #cbd5e1; font-size: 9px; font-weight: 400; }
  </style>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>

    <!-- Colored arrowheads per source actor -->
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="30" class="title-text">리더 불참 → 대타 배정 워크플로우 (B-2)</text>
  <text x="30" y="46" class="subtitle-text">leader.html · USER-STORY 핵심 시나리오 · 지점장 워크플로우</text>

  <!-- Lifelines (drawn first so boxes overlay top) -->
  <line x1="130" y1="115" x2="130" y2="660" stroke="#64748b" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="370" y1="115" x2="370" y2="660" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="610" y1="115" x2="610" y2="660" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="850" y1="115" x2="850" y2="660" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="1090" y1="115" x2="1090" y2="660" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Activation bar on 지점장 lifeline (covers the whole flow) -->
  <rect x="125" y="140" width="10" height="450" rx="2" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1"/>

  <!-- Actor 1: 지점장 (violet — Actor) -->
  <rect x="50" y="65" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="50" y="65" width="160" height="50" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="130" y="88" class="actor-name" text-anchor="middle">👤 지점장</text>
  <text x="130" y="103" class="actor-role" text-anchor="middle">Actor</text>

  <!-- Actor 2: 좌측 현황 보드 (cyan — UI) -->
  <rect x="290" y="65" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="290" y="65" width="160" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="370" y="88" class="actor-name" text-anchor="middle">좌측 현황 보드</text>
  <text x="370" y="103" class="actor-role" text-anchor="middle">UI · 7일 스와이프</text>

  <!-- Actor 3: 우측 불참 일정 보드 (blue — UI) -->
  <rect x="530" y="65" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="530" y="65" width="160" height="50" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="610" y="88" class="actor-name" text-anchor="middle">우측 불참 일정</text>
  <text x="610" y="103" class="actor-role" text-anchor="middle">UI · 빨간 테마</text>

  <!-- Actor 4: 클립보드 (emerald — System) -->
  <rect x="770" y="65" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="770" y="65" width="160" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="850" y="88" class="actor-name" text-anchor="middle">📋 클립보드</text>
  <text x="850" y="103" class="actor-role" text-anchor="middle">System</text>

  <!-- Actor 5: 불참 리더 (orange — External) -->
  <rect x="1010" y="65" width="160" height="50" rx="6" fill="#0f172a"/>
  <rect x="1010" y="65" width="160" height="50" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="1090" y="88" class="actor-name" text-anchor="middle">📞 불참 리더</text>
  <text x="1090" y="103" class="actor-role" text-anchor="middle">External</text>

  <!-- ============================ MESSAGES ============================ -->

  <!-- Msg 1: 지점장 → 좌측 (sync, violet) y=150 -->
  <circle cx="115" cy="150" r="9" fill="rgba(167,139,250,0.25)" stroke="#a78bfa" stroke-width="1"/>
  <text x="115" y="153" class="msg-num" text-anchor="middle">1</text>
  <line x1="135" y1="150" x2="370" y2="150" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="252" y="143" class="msg-label" text-anchor="middle">상태 필터 = "불참" 선택</text>

  <!-- Msg 2: 좌측 → 지점장 (return, cyan, dashed) y=190 -->
  <circle cx="115" cy="190" r="9" fill="rgba(34,211,238,0.25)" stroke="#22d3ee" stroke-width="1"/>
  <text x="115" y="193" class="msg-num" text-anchor="middle">2</text>
  <line x1="370" y1="190" x2="135" y2="190" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-cyan)"/>
  <text x="252" y="183" class="msg-label-return" text-anchor="middle">불참 리더 목록 표시</text>

  <!-- Msg 3: 지점장 → 우측 (sync, violet) y=240 -->
  <circle cx="115" cy="240" r="9" fill="rgba(167,139,250,0.25)" stroke="#a78bfa" stroke-width="1"/>
  <text x="115" y="243" class="msg-num" text-anchor="middle">3</text>
  <line x1="135" y1="240" x2="610" y2="240" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="372" y="233" class="msg-label" text-anchor="middle">불참 일정 카드 확인</text>

  <!-- Msg 4: 우측 → 지점장 (return, blue) y=280 -->
  <circle cx="115" cy="280" r="9" fill="rgba(96,165,250,0.25)" stroke="#60a5fa" stroke-width="1"/>
  <text x="115" y="283" class="msg-num" text-anchor="middle">4</text>
  <line x1="610" y1="280" x2="135" y2="280" stroke="#60a5fa" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="372" y="273" class="msg-label-return" text-anchor="middle">날짜별 체크박스 노출</text>

  <!-- Msg 5: 지점장 → 클립보드 (sync, violet) y=330 -->
  <circle cx="115" cy="330" r="9" fill="rgba(167,139,250,0.25)" stroke="#a78bfa" stroke-width="1"/>
  <text x="115" y="333" class="msg-num" text-anchor="middle">5</text>
  <line x1="135" y1="330" x2="850" y2="330" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="492" y="323" class="msg-label" text-anchor="middle">전화번호 클릭 (복사 트리거)</text>

  <!-- Msg 6: 클립보드 → 지점장 (return, emerald) y=370 -->
  <circle cx="115" cy="370" r="9" fill="rgba(52,211,153,0.25)" stroke="#34d399" stroke-width="1"/>
  <text x="115" y="373" class="msg-num" text-anchor="middle">6</text>
  <line x1="850" y1="370" x2="135" y2="370" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-emerald)"/>
  <text x="492" y="363" class="msg-label-return" text-anchor="middle">토스트 알림 1.5초 "복사됨"</text>

  <!-- Msg 7: 지점장 → 불참 리더 (sync, violet) y=430 -->
  <circle cx="115" cy="430" r="9" fill="rgba(167,139,250,0.25)" stroke="#a78bfa" stroke-width="1"/>
  <text x="115" y="433" class="msg-num" text-anchor="middle">7</text>
  <line x1="135" y1="430" x2="1090" y2="430" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="612" y="423" class="msg-label" text-anchor="middle">📞 통화 → 대타 요청</text>

  <!-- Msg 8: 불참 리더 → 지점장 (return, orange) y=470 -->
  <circle cx="115" cy="470" r="9" fill="rgba(251,146,60,0.25)" stroke="#fb923c" stroke-width="1"/>
  <text x="115" y="473" class="msg-num" text-anchor="middle">8</text>
  <line x1="1090" y1="470" x2="135" y2="470" stroke="#fb923c" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="612" y="463" class="msg-label-return" text-anchor="middle">대타 확정 (응답)</text>

  <!-- Msg 9: 지점장 → 우측 (sync, violet) y=520 -->
  <circle cx="115" cy="520" r="9" fill="rgba(167,139,250,0.25)" stroke="#a78bfa" stroke-width="1"/>
  <text x="115" y="523" class="msg-num" text-anchor="middle">9</text>
  <line x1="135" y1="520" x2="610" y2="520" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="372" y="513" class="msg-label" text-anchor="middle">해당 날짜 체크박스 클릭</text>

  <!-- Msg 10: 우측 → 지점장 (return, blue) y=560 -->
  <circle cx="115" cy="560" r="9" fill="rgba(96,165,250,0.25)" stroke="#60a5fa" stroke-width="1"/>
  <text x="115" y="563" class="msg-num" text-anchor="middle">10</text>
  <line x1="610" y1="560" x2="135" y2="560" stroke="#60a5fa" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="372" y="553" class="msg-label-return" text-anchor="middle">취소선 + 초록 체크 표시</text>

  <!-- Note frame at bottom -->
  <rect x="200" y="605" width="820" height="42" rx="6" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="200" y="605" width="48" height="16" rx="4" fill="rgba(30,41,59,0.9)" stroke="#fbbf24" stroke-width="1"/>
  <text x="224" y="617" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">note</text>
  <text x="610" y="630" class="note-text" text-anchor="middle">모든 불참 날짜 해결 시 → 행 0.4s 페이드아웃 자동 제거 · 카운트 갱신</text>

  <!-- Legend (bottom area) -->
  <g transform="translate(30, 680)">
    <text x="0" y="0" class="legend-text" font-weight="600">Legend:</text>

    <rect x="60" y="-9" width="14" height="10" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
    <text x="80" y="0" class="legend-text">Actor</text>

    <rect x="135" y="-9" width="14" height="10" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
    <text x="155" y="0" class="legend-text">UI (현황)</text>

    <rect x="225" y="-9" width="14" height="10" rx="2" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1"/>
    <text x="245" y="0" class="legend-text">UI (불참)</text>

    <rect x="320" y="-9" width="14" height="10" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
    <text x="340" y="0" class="legend-text">System</text>

    <rect x="405" y="-9" width="14" height="10" rx="2" fill="rgba(120,53,15,0.4)" stroke="#fb923c" stroke-width="1"/>
    <text x="425" y="0" class="legend-text">External</text>

    <line x1="500" y1="-4" x2="535" y2="-4" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="545" y="0" class="legend-text">Sync (요청)</text>

    <line x1="635" y1="-4" x2="670" y2="-4" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="680" y="0" class="legend-text">Return (응답)</text>

    <rect x="780" y="-9" width="10" height="10" rx="2" fill="rgba(76,29,149,0.5)" stroke="#a78bfa" stroke-width="1"/>
    <text x="796" y="0" class="legend-text">Activation Bar (지점장 처리 중)</text>
  </g>
</svg>
