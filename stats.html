<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>하남 지점 어드민 - 통계 및 리포트</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/tailwind-config.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="shared/styles.css" />
    <style>
        .stat-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="antialiased min-h-screen pb-24">

    <div id="app-header"></div>
    <div id="app-drawer"></div>

    <!-- MAIN CONTENT -->
    <main class="max-w-[1600px] mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-2">
            <h2 class="text-3xl font-black text-slate-800 tracking-tight flex items-center gap-3">
                STATISTICS
                <span class="text-sm font-semibold text-brand-600 bg-brand-50 px-2 py-1 rounded-md border border-brand-100">지점 실적 분석</span>
            </h2>
            <div class="flex items-center gap-2">
                <button class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm">
                    <i class="ph ph-calendar text-lg"></i> 2026년 4월
                </button>
                <button class="px-4 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold hover:bg-slate-800 transition-all flex items-center gap-2 shadow-lg">
                    <i class="ph ph-download-simple text-lg"></i> 리포트 다운로드
                </button>
            </div>
        </div>

        <!-- Key Metrics Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="stat-card bg-white p-6 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden group">
                <div class="absolute -right-6 -top-6 text-slate-50 opacity-50 group-hover:scale-110 transition-transform">
                    <i class="ph ph-users-three text-8xl"></i>
                </div>
                <div class="relative z-10">
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">전체 활성 멤버</p>
                    <h3 class="text-3xl font-black text-slate-800">1,248 <span class="text-sm font-semibold text-emerald-500 ml-1">▲ 12%</span></h3>
                    <p class="text-[11px] text-slate-500 mt-2">지난달 대비 142명 증가</p>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden group">
                <div class="absolute -right-6 -top-6 text-slate-50 opacity-50 group-hover:scale-110 transition-transform">
                    <i class="ph ph-chart-line-up text-8xl"></i>
                </div>
                <div class="relative z-10">
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">월 평균 출석률</p>
                    <h3 class="text-3xl font-black text-brand-600">84.2% <span class="text-sm font-semibold text-emerald-500 ml-1">▲ 3.4%</span></h3>
                    <p class="text-[11px] text-slate-500 mt-2">멤버 86% / 리더 92%</p>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden group">
                <div class="absolute -right-6 -top-6 text-slate-50 opacity-50 group-hover:scale-110 transition-transform">
                    <i class="ph ph-student text-8xl"></i>
                </div>
                <div class="relative z-10">
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">신규 등록 건수</p>
                    <h3 class="text-3xl font-black text-slate-800">84 <span class="text-sm font-semibold text-amber-500 ml-1">▼ 2%</span></h3>
                    <p class="text-[11px] text-slate-500 mt-2">영어(52) / 일어(32)</p>
                </div>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden group">
                <div class="absolute -right-6 -top-6 text-slate-50 opacity-50 group-hover:scale-110 transition-transform">
                    <i class="ph ph-trend-up text-8xl"></i>
                </div>
                <div class="relative z-10">
                    <p class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">예상 매출 달성도</p>
                    <h3 class="text-3xl font-black text-indigo-600">92.5%</h3>
                    <div class="w-full bg-slate-100 h-2 rounded-full mt-3 overflow-hidden">
                        <div class="bg-indigo-500 h-full rounded-full" style="width: 92.5%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Mockup Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <i class="ph-fill ph-chart-bar text-brand-500 text-xl"></i>
                        요일별 출석 추이
                    </h3>
                    <select class="text-xs bg-slate-50 border border-slate-200 rounded-lg px-2 py-1 outline-none">
                        <option>최근 4주</option>
                        <option>최근 3개월</option>
                    </select>
                </div>
                <div class="h-[300px] flex items-end justify-between gap-2 px-2">
                    <div class="flex-1 flex flex-col items-center gap-2 group">
                        <div class="w-full bg-brand-100 rounded-t-lg group-hover:bg-brand-200 transition-colors" style="height: 60%"></div>
                        <span class="text-xs font-bold text-slate-400">월</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center gap-2 group">
                        <div class="w-full bg-brand-100 rounded-t-lg group-hover:bg-brand-200 transition-colors" style="height: 75%"></div>
                        <span class="text-xs font-bold text-slate-400">화</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center gap-2 group">
                        <div class="w-full bg-brand-500 rounded-t-lg group-hover:bg-brand-600 transition-colors shadow-lg" style="height: 90%"></div>
                        <span class="text-xs font-bold text-slate-800 uppercase">수</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center gap-2 group">
                        <div class="w-full bg-brand-100 rounded-t-lg group-hover:bg-brand-200 transition-colors" style="height: 80%"></div>
                        <span class="text-xs font-bold text-slate-400">목</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center gap-2 group">
                        <div class="w-full bg-brand-100 rounded-t-lg group-hover:bg-brand-200 transition-colors" style="height: 65%"></div>
                        <span class="text-xs font-bold text-slate-400">금</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center gap-2 group">
                        <div class="w-full bg-slate-100 rounded-t-lg group-hover:bg-slate-200 transition-colors" style="height: 40%"></div>
                        <span class="text-xs font-bold text-slate-400">토</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center gap-2 group">
                        <div class="w-full bg-slate-100 rounded-t-lg group-hover:bg-slate-200 transition-colors" style="height: 30%"></div>
                        <span class="text-xs font-bold text-slate-400">일</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <i class="ph-fill ph-circles-three-plus text-indigo-500 text-xl"></i>
                        팀별 분배 현황 (언어/시간)
                    </h3>
                </div>
                <div class="space-y-4">
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-end">
                            <span class="text-sm font-bold text-slate-700">영어 오전 반 (11시)</span>
                            <span class="text-sm font-black text-indigo-600">423명</span>
                        </div>
                        <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                            <div class="bg-indigo-500 h-full rounded-full" style="width: 45%"></div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-end">
                            <span class="text-sm font-bold text-slate-700">영어 저녁 반 (8시)</span>
                            <span class="text-sm font-black text-indigo-600">382명</span>
                        </div>
                        <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                            <div class="bg-indigo-400 h-full rounded-full" style="width: 40%"></div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-end">
                            <span class="text-sm font-bold text-slate-700">일어 오전 반 (11시)</span>
                            <span class="text-sm font-black text-blue-600">214명</span>
                        </div>
                        <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full rounded-full" style="width: 25%"></div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-end">
                            <span class="text-sm font-bold text-slate-700">일어 저녁 반 (8시)</span>
                            <span class="text-sm font-black text-blue-600">229명</span>
                        </div>
                        <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                            <div class="bg-blue-400 h-full rounded-full" style="width: 28%"></div>
                        </div>
                    </div>
                </div>
                <div class="mt-8 pt-6 border-t border-slate-100 flex justify-center gap-6">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-indigo-500 shadow-sm shadow-indigo-100"></span>
                        <span class="text-xs font-bold text-slate-500 uppercase">Engineering</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-blue-500 shadow-sm shadow-blue-100"></span>
                        <span class="text-xs font-bold text-slate-500 uppercase">Japanese</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="shared/utils.js"></script>
    <script src="shared/header.js"></script>
    <script src="shared/drawer.js"></script>
</body>
</html>
